<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MÁV - Jegyvásárlás</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="navbar">
        <div class="logo-section">
          <img src="./images/ujlogo.png" alt="VÁM Logo" class="logo" />
          <span class="logo-text">MÁV</span>
        </div>
        <div class="nav-menu">
          <a href="index.html" class="nav-link">Főoldal</a>
          <a href="jegyek.html" class="nav-link active">Jegyek</a>
          <a href="gyik.html" class="nav-link">GYIK</a>
          <a href="kapcsolat.html" class="nav-link">Ügyfélszolgálat</a>
        </div>
        <div
          class="user-menu-container"
          style="position: relative; justify-self: end"
        >
          <button
            class="search-button" onclick="showSection('account-section')"
            id="login-trigger"
            aria-label="Bejelentkezés"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>

          <div class="login-dropdown" id="login-dropdown">
            <h3>Bejelentkezés</h3>
            <form>
              <input
                type="text"
                placeholder="Felhasználónév vagy e-mail"
                class="input-field"
                style="
                  width: 100%;
                  margin-bottom: 10px;
                  padding: 8px;
                  border-radius: 4px;
                  border: 1px solid #ccc;
                "
              />
              <input
                type="password"
                placeholder="Jelszó"
                class="input-field"
                style="
                  width: 100%;
                  margin-bottom: 10px;
                  padding: 8px;
                  border-radius: 4px;
                  border: 1px solid #ccc;
                "
              />
              <div
                class="login-options"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  margin-bottom: 15px;
                  font-size: 0.85rem;
                "
              >
                <label style="display: flex; align-items: center; gap: 5px">
                  <input type="checkbox" /> Emlékezz rám
                </label>
                <a href="#" style="color: #0055d4; text-decoration: none"
                  >Elfelejtett jelszó?</a
                >
              </div>
              <button
                type="submit"
                class="dynamic-btn"
                style="width: 100%; margin-top: 5px"
              >
                Belépés
              </button>
              <p
                style="text-align: center; font-size: 0.85rem; margin-top: 15px"
              >
                Nincs még fiókja?
                <a
                  href="regisztracio.html"
                  style="
                    color: #0055d4;
                    text-decoration: none;
                    font-weight: bold;
                  "
                  >Regisztráció</a
                >
              </p>
            </form>
          </div>
        </div>
      </div>
    </header>

    <main class="content-container">
      
      <section id="selection-section" class="page-step">
        <div class="inner-page">
            <h2>Jegyvásárlás</h2>
            <div class="ticket-form-container">
                <form class="ticket-form" onsubmit="event.preventDefault(); alert('Keresés...');">
                    <div class="form-group">
                        <label>Honnan?</label>
                        <input type="text" placeholder="Indulási állomás" class="input-field" />
                    </div>
                    <div class="form-icon">⇄</div>
                    <div class="form-group">
                        <label>Hova?</label>
                        <input type="text" placeholder="Célállomás" class="input-field" />
                    </div>
                    <button type="submit" class="dynamic-btn">Keresés</button>
                </form>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" onclick="filterProducts('jegy')">Jegyek</button>
                <button class="tab-btn" onclick="filterProducts('berlet')">Bérletek</button>
            </div>

            <div id="product-list" class="product-grid">
                </div>
        </div>
      </section>

      <section id="checkout-section" class="page-step hidden">
        <div class="inner-page">
            <button class="back-btn" onclick="showSection('selection-section')">← Vissza a választáshoz</button>
            <h2>Vásárlás véglegesítése</h2>
            
            <div class="checkout-wrapper">
                <div class="summary-card" id="selected-item-info">
                    </div>

                <form id="purchase-form" class="checkout-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Teljes név</label>
                            <input type="text" id="cust-name" class="input-field" required placeholder="Minta János">
                        </div>
                        <div class="form-group">
                            <label>Személyigazolvány szám</label>
                            <input type="text" id="cust-id" class="input-field" required placeholder="123456AB">
                        </div>
                    </div>
                    
                    <div class="payment-box">
                        <h3>Fizetési adatok</h3>
                        <input type="text" class="input-field" placeholder="Kártyaszám" required>
                        <div class="form-row">
                            <input type="text" class="input-field" placeholder="Lejárat (MM/YY)" required>
                            <input type="password" class="input-field" placeholder="CVC" required>
                        </div>
                    </div>

                    <button type="submit" class="dynamic-btn confirm-btn">Fizetés és QR-kód generálása</button>
                </form>
            </div>
        </div>
      </section>

      <section id="account-section" class="page-step hidden">
        <div class="inner-page">
            <div class="section-header">
                <h2>Saját jegyeim</h2>
                <button class="dynamic-btn outline" onclick="showSection('selection-section')">+ Új jegy</button>
            </div>
            <div id="my-tickets" class="my-tickets-container">
                </div>
        </div>
      </section>

    </main>

    <footer class="footer">
      <p>&copy; 2026 VÁM - Minden jog fenntartva.</p>
    </footer>

    <script src="script.js"></script>
  </body>
  <script src="script.js"></script>
</html>
