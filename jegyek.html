<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MÁV – Jegyvásárlás & Menetrend</title>
  <meta name="description" content="Vásároljon MÁV vonatjegyet vagy bérletet online. Interaktív útvonaltervező."/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #route-map { height: 380px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
    .route-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); margin-bottom: 24px; }
    .route-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .route-train-badge { background: linear-gradient(135deg,#0071e3,#004ba0); color:#fff; padding: 6px 16px; border-radius: 999px; font-size: .85rem; font-weight: 700; }
    .route-duration { font-size: 1.8rem; font-weight: 800; color: var(--text); }
    .stops-timeline { position: relative; padding-left: 28px; }
    .stops-timeline::before { content:''; position:absolute; left:10px; top:10px; bottom:10px; width:2px; background: linear-gradient(to bottom,#0071e3,#e0e0e5); border-radius:2px; }
    .stop-row { display:flex; align-items:center; justify-content:space-between; padding: 10px 0; position: relative; }
    .stop-dot { position:absolute; left:-22px; width:14px; height:14px; border-radius:50%; background:#0071e3; border:3px solid #fff; box-shadow:0 0 0 2px #0071e3; }
    .stop-dot.end { background:#fff; border-color:#0071e3; }
    .stop-name { font-weight: 600; font-size: .95rem; }
    .stop-time { font-size: .9rem; color: var(--text-secondary); font-weight: 500; }
    .stop-arr  { font-size: .78rem; color: #9a9a9f; }
    .no-route { text-align:center; padding: 48px; color: var(--text-secondary); }
    .search-section { background:#f5f5f7; border-radius: var(--radius); padding: 28px; margin-bottom: 32px; }
    .search-grid { display: grid; grid-template-columns: 1fr auto 1fr 1fr auto; gap: 12px; align-items: end; }
    @media(max-width:768px){ .search-grid{grid-template-columns:1fr;} }
    .route-map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media(max-width:768px){ .route-map-grid{grid-template-columns:1fr;} }
    /* Card input formatting */
    .card-input-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="navbar">
    <div class="logo-section">
      <img src="./images/ujlogo.png" alt="MÁV" class="logo"/>
      <span class="logo-text">MÁV</span>
    </div>
    <nav class="nav-menu">
      <a href="index.html"    class="nav-link">Főoldal</a>
      <a href="jegyek.html"   class="nav-link active">Jegyek</a>
      <a href="gyik.html"     class="nav-link">GYIK</a>
      <a href="kapcsolat.html" class="nav-link">Ügyfélszolgálat</a>
    </nav>
    <div class="user-menu-container">
      <span id="nav-username" style="font-size:.88rem;font-weight:600;color:#6e6e73;display:none;"></span>
      <button class="user-btn" id="login-trigger" aria-label="Bejelentkezés">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <button class="avatar-btn" id="avatar-btn" aria-label="Fiók"></button>
      <div class="login-dropdown" id="login-dropdown">
        <div id="drop-auth">
          <div class="drop-tabs">
            <button class="drop-tab active" id="tab-login" onclick="switchTab('login')">Bejelentkezés</button>
            <button class="drop-tab" id="tab-reg" onclick="switchTab('reg')">Regisztráció</button>
          </div>
          <div class="drop-panel active" id="panel-login">
            <div class="msg" id="login-msg"></div>
            <div class="form-group"><label>E-mail</label><input type="email" id="login-email" class="input-field" placeholder="pelda@email.hu"/></div>
            <div class="form-group"><label>Jelszó</label><input type="password" id="login-pass" class="input-field" placeholder="••••••••"/></div>
            <button class="btn btn-primary btn-full" onclick="doLogin()">Bejelentkezés</button>
          </div>
          <div class="drop-panel" id="panel-reg">
            <div class="msg" id="reg-msg"></div>
            <div class="form-group"><label>Teljes név</label><input type="text" id="reg-nev" class="input-field" placeholder="Minta János"/></div>
            <div class="form-group"><label>E-mail</label><input type="email" id="reg-email" class="input-field" placeholder="pelda@email.hu"/></div>
            <div class="form-group"><label>Jelszó</label><input type="password" id="reg-pass" class="input-field" placeholder="Min. 8 karakter"/></div>
            <button class="btn btn-primary btn-full" onclick="doRegister()">Fiók létrehozása</button>
          </div>
        </div>
        <div id="drop-user" style="display:none;">
          <p style="font-weight:700;margin-bottom:4px;" id="drop-username"></p>
          <p style="font-size:.85rem;color:#6e6e73;margin-bottom:20px;" id="drop-email"></p>
          <button class="btn btn-secondary btn-full" style="margin-bottom:10px;" onclick="showSection('account-section')">Saját jegyeim</button>
          <button class="btn btn-outline btn-full" onclick="doLogout()">Kijelentkezés</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- datalist for autocomplete -->
<datalist id="stations-list">
  <option value="Budapest Keleti">
  <option value="Budapest Nyugati">
  <option value="Budapest Déli">
  <option value="Győr">
  <option value="Pécs">
  <option value="Debrecen">
  <option value="Miskolc">
  <option value="Nyíregyháza">
  <option value="Kecskemét">
  <option value="Székesfehérvár">
  <option value="Szombathely">
  <option value="Veszprém">
  <option value="Eger">
  <option value="Szolnok">
  <option value="Tatabánya">
  <option value="Komárom">
  <option value="Hatvan">
  <option value="Füzesabony">
  <option value="Dombóvár">
  <option value="Celldömölk">
  <option value="Püspökladány">
</datalist>

<main>

  <!-- ── SECTION 1: Selection + Route Planner ── -->
  <div id="selection-section" class="page-step">
    <div class="page-wrap">

      <!-- Route Search -->
      <div class="section-label" style="margin-bottom:6px;">Útvonaltervező</div>
      <h1 class="section-title" style="margin-bottom:20px;">Honnan – hova?</h1>

      <div class="search-section">
        <div class="search-grid">
          <div class="form-group" style="margin-bottom:0;">
            <label>Indulás</label>
            <input type="text" id="from-station" class="input-field" placeholder="pl. Budapest Keleti" list="stations-list" style="margin-bottom:0;"/>
          </div>
          <button onclick="swapStations()" style="background:none;border:none;font-size:1.6rem;cursor:pointer;color:#0071e3;padding-bottom:2px;transition:.2s;" title="Csere" onmouseover="this.style.transform='rotate(180deg)'" onmouseout="this.style.transform=''">⇄</button>
          <div class="form-group" style="margin-bottom:0;">
            <label>Érkezés</label>
            <input type="text" id="to-station" class="input-field" placeholder="pl. Győr" list="stations-list" style="margin-bottom:0;"/>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>Dátum</label>
            <input type="date" id="travel-date" class="input-field" style="margin-bottom:0;"/>
          </div>
          <button class="btn btn-primary" style="white-space:nowrap;" onclick="searchRoute()">🔍 Keresés</button>
        </div>
      </div>

      <!-- Route Results (hidden until searched) -->
      <div id="route-section" style="display:none;">
        <div class="route-map-grid">
          <div>
            <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:14px;color:var(--text-secondary);">🗺️ Térképes nézet</h2>
            <div id="route-map"></div>
          </div>
          <div>
            <div id="route-results"></div>
          </div>
        </div>
        <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border);">
          <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:14px;">🎫 Elérhető jegyek erre az útvonalra</h2>
          <div id="product-list" class="product-grid"></div>
        </div>
      </div>

      <!-- Default product list (before search) -->
      <div id="default-products">
        <div class="tab-bar" style="margin-top:8px;">
          <button class="tab-btn active" id="tab-jegy" onclick="filterProducts('jegy',this)">Jegyek</button>
          <button class="tab-btn" id="tab-berlet" onclick="filterProducts('berlet',this)">Bérletek</button>
        </div>
        <div id="default-product-list" class="product-grid"></div>
      </div>

    </div>
  </div>

  <!-- ── SECTION 2: Checkout ── -->
  <div id="checkout-section" class="page-step hidden">
    <div class="page-wrap">
      <button class="back-btn" onclick="showSection('selection-section')">← Vissza a választáshoz</button>
      <h1 class="section-title" style="margin-bottom:28px;">Vásárlás véglegesítése</h1>
      <div class="checkout-wrapper">
        <div class="summary-card" id="selected-item-info"></div>
        <form id="purchase-form" class="checkout-form" onsubmit="return false;">
          <div class="form-row">
            <div class="form-group">
              <label>Teljes név</label>
              <input type="text" id="cust-name" class="input-field" required placeholder="Minta János"
                autocomplete="name" maxlength="100"/>
            </div>
            <div class="form-group">
              <label>Személyigazolvány szám</label>
              <input type="text" id="cust-id" class="input-field" required placeholder="123456AB"
                maxlength="8" pattern="[0-9]{6}[A-Za-z]{2}" title="6 szám + 2 betű, pl. 123456AB"/>
            </div>
          </div>

          <div class="payment-box">
            <h3>💳 Fizetési adatok</h3>
            <div class="form-group">
              <label>Kártyaszám</label>
              <input type="text" id="card-number" class="input-field" placeholder="1234 5678 9012 3456"
                maxlength="19" inputmode="numeric" required autocomplete="cc-number"/>
            </div>
            <div class="card-input-row">
              <div class="form-group">
                <label>Lejárat</label>
                <input type="text" id="card-expiry" class="input-field" placeholder="MM/ÉÉ"
                  maxlength="5" required autocomplete="cc-exp"/>
              </div>
              <div class="form-group">
                <label>CVC</label>
                <input type="password" id="card-cvc" class="input-field" placeholder="123"
                  maxlength="3" minlength="3" inputmode="numeric" required autocomplete="cc-csc"
                  pattern="\d{3}" title="3 számjegyű biztonsági kód"/>
              </div>
            </div>
          </div>

          <div id="purchase-msg" class="msg"></div>
          <button type="button" class="btn btn-primary btn-full" style="font-size:1rem;" onclick="doPurchase()">
            Fizetés és QR-kód generálása →
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── SECTION 3: My Tickets ── -->
  <div id="account-section" class="page-step hidden">
    <div class="page-wrap">
      <button class="back-btn" onclick="showSection('selection-section')">← Vissza a jegyekhez</button>
      <div class="section-header">
        <h1 class="section-title" style="margin-bottom:0;">Saját jegyeim</h1>
        <button class="btn btn-primary btn-sm" onclick="showSection('selection-section')">+ Új jegy</button>
      </div>
      <div id="my-tickets"></div>
    </div>
  </div>

</main>

<footer class="footer">
  <div class="footer-inner">
    <span class="footer-brand">MÁV</span>
    <div class="footer-links">
      <a href="gyik.html">GYIK</a>
      <a href="kapcsolat.html">Kapcsolat</a>
      <a href="#">Adatvédelem</a>
    </div>
    <span class="footer-copy">© 2026 MÁV – Minden jog fenntartva.</span>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="routes.js"></script>
<script src="script.js"></script>
</body>
</html>
