<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="./images/nohattermavlogo.png">
    <link rel="stylesheet" href="style.css" />

  <body>
    <header class="topbar">
      <div class="navbar">
        <div class="logo-section">
          <img src="./images/nohattermavlogo.png" alt="VÁM Logo" class="logo" />
          <span class="logo-text">MÁV</span>
        </div>
        <div class="nav-menu">
          <a href="index.html" class="nav-link">Menetrendek</a>

    <main class="content-container inner-page">
      <div style="max-width: 450px; margin: 60px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
        <h2 style="margin-bottom: 15px; color: #003087; text-align: center;">Elfelejtett jelszó</h2>
        <p style="text-align: center; color: #666; font-size: 0.95rem; margin-bottom: 25px;">
          Kérjük, adja meg a fiókjához tartozó e-mail címet. Küldünk Önnek egy hivatkozást, amellyel új jelszót állíthat be.
        </p>
        <form>
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">E-mail cím</label>
            <input type="email" placeholder="pelda@email.hu" class="input-field" style="width: 100%;" required />
          </div>
          <button type="submit" class="dynamic-btn" style="width: 100%;">Jelszó-visszaállító e-mail küldése</button>
        </form>
        <div style="text-align: center; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px;">
          <a href="index.html" style="color: #0055d4; text-decoration: none; font-size: 0.9rem;">← Vissza a főoldalra</a>
        </div>
      </div>
    </main>
