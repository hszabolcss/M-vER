<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MÁV – Regisztráció</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body style="background:#f5f5f7;">
<header class="topbar">
  <div class="navbar">
    <div class="logo-section">
      <img src="./images/ujlogo.png" alt="MÁV" class="logo"/>
      <span class="logo-text">MÁV</span>
    </div>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link">Főoldal</a>
      <a href="jegyek.html" class="nav-link">Jegyek</a>
      <a href="gyik.html" class="nav-link">GYIK</a>
      <a href="kapcsolat.html" class="nav-link">Ügyfélszolgálat</a>
    </nav>
    <div style="justify-self:end;"></div>
  </div>
</header>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="./images/ujlogo.png" alt="MÁV" style="height:36px;width:36px;object-fit:contain;"/>
      <span>MÁV</span>
    </div>
    <h1>Fiók létrehozása</h1>
    <p class="subtitle">Csatlakozzon és vásároljon jegyeket egyszerűbben.</p>

    <div class="msg" id="reg-msg"></div>

    <div class="form-group">
      <label>Teljes név</label>
      <input type="text" id="reg-nev" class="input-field" placeholder="Minta János" required/>
    </div>
    <div class="form-group">
      <label>E-mail cím</label>
      <input type="email" id="reg-email" class="input-field" placeholder="pelda@email.hu" required/>
    </div>
    <div class="form-group">
      <label>Jelszó</label>
      <input type="password" id="reg-pass" class="input-field" placeholder="Legalább 8 karakter" required/>
    </div>
    <div class="form-group">
      <label>Jelszó megerősítése</label>
      <input type="password" id="reg-pass2" class="input-field" placeholder="••••••••" required/>
    </div>
    <div style="margin-bottom:20px;font-size:.88rem;color:#6e6e73;">
      <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;">
        <input type="checkbox" id="reg-terms" style="margin-top:3px;flex-shrink:0;"/>
        Elfogadom az <a href="#" class="auth-link" style="margin:0 3px;">ÁSZF</a>-et és az adatkezelési szabályzatot.
      </label>
    </div>
    <button class="btn btn-primary btn-full" id="reg-submit-btn" onclick="doRegisterPage()">Regisztráció</button>
    <p class="auth-footer">Van már fiókja? <a href="index.html" class="auth-link">Bejelentkezés</a></p>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
