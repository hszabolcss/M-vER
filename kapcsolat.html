<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MÁV - Kapcsolat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="navbar">
        <div class="logo-section">
          <img src="./images/ujlogo.png" alt="VÁM Logo" class="logo" />
          <span class="logo-text">MÁV</span>
        </div>
        <div class="nav-menu">
          <a href="index.html" class="nav-link">Főoldal</a>
          <a href="jegyek.html" class="nav-link">Jegyek</a>
          <a href="gyik.html" class="nav-link">GYIK</a>
          <a href="kapcsolat.html" class="nav-link active">Ügyfélszolgálat</a>
        </div>
                <div
          class="user-menu-container"
          style="position: relative; justify-self: end"
        >
          <button
            class="search-button"
            id="login-trigger"
            aria-label="Bejelentkezés"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>

          <div class="login-dropdown" id="login-dropdown">
            <h3>Bejelentkezés</h3>
            <form>
              <input
                type="text"
                placeholder="Felhasználónév vagy e-mail"
                class="input-field"
                style="
                  width: 100%;
                  margin-bottom: 10px;
                  padding: 8px;
                  border-radius: 4px;
                  border: 1px solid #ccc;
                "
              />
              <input
                type="password"
                placeholder="Jelszó"
                class="input-field"
                style="
                  width: 100%;
                  margin-bottom: 10px;
                  padding: 8px;
                  border-radius: 4px;
                  border: 1px solid #ccc;
                "
              />
              <div
                class="login-options"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  margin-bottom: 15px;
                  font-size: 0.85rem;
                "
              >
                <label style="display: flex; align-items: center; gap: 5px">
                  <input type="checkbox" /> Emlékezz rám
                </label>
                <a href="#" style="color: #0055d4; text-decoration: none"
                  >Elfelejtett jelszó?</a
                >
              </div>
              <button
                type="submit"
                class="dynamic-btn"
                style="width: 100%; margin-top: 5px"
              >
                Belépés
              </button>
              <p
                style="text-align: center; font-size: 0.85rem; margin-top: 15px"
              >
                Nincs még fiókja?
                <a
                  href="regisztracio.html"
                  style="
                    color: #0055d4;
                    text-decoration: none;
                    font-weight: bold;
                  "
                  >Regisztráció</a
                >
              </p>
            </form>
          </div>
        </div>
    </header>
    <main class="content-container inner-page">
      <h2>Ügyfélszolgálat és Kapcsolat</h2>
      <div class="contact-grid">
        <div class="contact-info">
          <div class="info-card">
            <h3>📞 Telefonos ügyfélszolgálat</h3>
            <p>+36 1 123 4567<br /><small>(Minden nap 0-24 órában)</small></p>
          </div>
          <div class="info-card">
            <h3>✉️ E-mail</h3>
            <p>ugyfelszolgalat@vam.hu</p>
          </div>
        </div>
        <div class="contact-form">
          <h3>Írjon nekünk</h3>
          <input type="text" placeholder="Név" class="input-field" />
          <input type="email" placeholder="E-mail cím" class="input-field" />
          <textarea
            placeholder="Üzenet"
            rows="5"
            class="input-field"
          ></textarea>
          <button class="dynamic-btn">Üzenet küldése</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 VÁM - Minden jog fenntartva.</p>
    </footer>
  </body>
  <script src="script.js"></script>
</html>
