<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VÁM - Jegyvásárlás, Menetrend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigáció -->
  <header class="topbar">
    <div class="navbar">
      <div class="logo-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/MAV_logo.svg/512px-MAV_logo.svg.png" 
             alt="VÁM Logo" class="logo">
        <span class="logo-text">VÁM</span>
      </div>

      <div class="nav-menu">
        <a href="#" class="nav-link active">Menetrendek</a>
        <a href="#" class="nav-link">Jegyek</a>
        <a href="#" class="nav-link">GYIK</a>
        <a href="#" class="nav-link">Ügyfélszolgálat</a>
      </div>

      <button class="search-button" aria-label="Keresés">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>
  </header>

  <!-- Hero kép + bal oldali kék doboz -->
  <div class="hero-container">
    <div class="hero">
      <img src="https://picsum.photos/id/1015/1400/520" alt="Hegyi vasút" class="hero-bg">
      
      <!-- Bal oldali kék szolgáltatás doboz -->
      <div class="service-panel">
        <div class="panel-title">Jegyvásárlás, menetrend</div>
        
        <a href="#" class="service-row">
          <span class="icon">🎫</span>
          Jegyvásárlás
          <span class="arrow">››</span>
        </a>
        <a href="#" class="service-row">
          <span class="icon">📍</span>
          Menetrend, térkép
          <span class="arrow">››</span>
        </a>
        <a href="#" class="service-row">
          <span class="icon">🗺️</span>
          Országbérlet
          <span class="arrow">››</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Lépések sáv – pontosan úgy, mint a képen (közvetlenül a kép alatt, fehér lekerekített) -->
  <div class="progress-container">
    <div class="progress-bar">
      <div class="step active">
        <div class="number">1</div>
        <div class="label">Jegyvásárlás</div>
      </div>
      <div class="step">
        <div class="number">2</div>
        <div class="label">Késési biztosítás</div>
      </div>
      <div class="step">
        <div class="number">3</div>
        <div class="label">Könnyed használat</div>
      </div>
      <div class="step">
        <div class="number">4</div>
        <div class="label">Gyorsabb betöltés</div>
      </div>
    </div>
  </div>

  <!-- Alsó gombok -->
  <div class="bottom-section">
    <a href="#" class="big-btn">Aktuális hírek</a>
    <a href="#" class="big-btn">Ajánlatok, Tudnivalók</a>
  </div>

</body>
</html>
